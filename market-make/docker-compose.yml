services:
  db:
    image: mysql:8.4
    container_name: market-make-db
    restart: unless-stopped
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-13306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
    # Matches the volume of the original `docker run` container,
    # so existing data is reused.
    name: market-make-db-data
