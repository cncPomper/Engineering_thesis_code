services:
  db:
    image: postgres:16
    container_name: market-make-db
    restart: unless-stopped
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
    name: market-make-db-data
